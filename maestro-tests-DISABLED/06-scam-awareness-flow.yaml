appId: host.exp.exponent
---
# Scam Awareness Flow Test
# Tests all scam-related checks (1-4-1 through 1-4-2)
- launchApp
- tapOn: "Get Started"
- tapOn: "Start Level 1"
- tapOn: "Avoid Scams & Fraud"
- assertVisible: "Spot Scams Before They Happen"
- assertVisible: "Report Scams to Help Others"

# Test 1-4-1: Spot Scams Before They Happen
- tapOn: "Spot Scams Before They Happen"
- assertVisible: "Scam Recognition"
- assertVisible: "Scam Examples"
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "Scam Quiz"
- assertVisible: "Mark as Complete"
- tapOn: "Mark as Complete"
- assertVisible: "Check Complete"

# Test 1-4-2: Report Scams to Help Others
- tapOn: "Report Scams to Help Others"
- assertVisible: "Scam Reporting"
- assertVisible: "Reporting Methods"
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "Report Guide"
- assertVisible: "Mark as Complete"
- tapOn: "Mark as Complete"
- assertVisible: "Check Complete"
