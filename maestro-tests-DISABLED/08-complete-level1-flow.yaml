- assertVisible: "Level 1 - CyberPup Scout"

# Navigate through all 5 security areas
- tapOn: "Protect Your Accounts"
- assertVisible: "Create Strong Passwords"
- tapOn: "Back"
- tapOn: "Secure Your Devices"
- assertVisible: "Lock Your Device Automatically"
- tapOn: "Back"
- tapOn: "Keep Your Data Safe"
- assertVisible: "Back Up Your Data to the Cloud"
- tapOn: "Back"
- tapOn: "Avoid Scams & Fraud"
- assertVisible: "Spot Scams Before They Happen"
- tapOn: "Back"
- tapOn: "Protect Your Privacy"
- assertVisible: "Be Smart About What You Share"
- tapOn: "Back"

# Test progress tracking
- assertVisible: "Level 1 - CyberPup Scout"
- assertVisible: "Progress"
- assertVisible: "0 of 15 checks completed"
