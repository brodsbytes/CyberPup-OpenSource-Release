appId: host.exp.exponent
---
# Password Security Flow Test
# Tests all password-related checks (1-1-1 through 1-1-5)
- launchApp
- tapOn: "Get Started"
- tapOn: "Start Level 1"
- tapOn: "Protect Your Accounts"
- assertVisible: "Create Strong Passwords"
- assertVisible: "Secure Your Most Important Accounts"
- assertVisible: "Set Up a Password Manager"
- assertVisible: "Add Extra Protection to Your Accounts"
- assertVisible: "Check if Your Data Was Compromised"

# Test 1-1-1: Create Strong Passwords
- tapOn: "Create Strong Passwords"
- assertVisible: "Strong Passwords"
- assertVisible: "Password Requirements"
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "Password Examples"
- assertVisible: "Mark as Complete"
- tapOn: "Mark as Complete"
- assertVisible: "Check Complete"

# Test 1-1-2: Secure Your Most Important Accounts
- tapOn: "Secure Your Most Important Accounts"
- assertVisible: "High-Value Accounts"
- assertVisible: "Banking"
- assertVisible: "Email"
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "Account Security"
- assertVisible: "Mark as Complete"
- tapOn: "Mark as Complete"
- assertVisible: "Check Complete"

# Test 1-1-3: Set Up a Password Manager
- tapOn: "Set Up a Password Manager"
- assertVisible: "Password Manager"
- assertVisible: "Choose a Manager"
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "Installation Guide"
- assertVisible: "Mark as Complete"
- tapOn: "Mark as Complete"
- assertVisible: "Check Complete"

# Test 1-1-4: Add Extra Protection to Your Accounts
- tapOn: "Add Extra Protection to Your Accounts"
- assertVisible: "Multi-Factor Authentication"
- assertVisible: "MFA Setup"
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "MFA Options"
- assertVisible: "Mark as Complete"
- tapOn: "Mark as Complete"
- assertVisible: "Check Complete"

# Test 1-1-5: Check if Your Data Was Compromised
- tapOn: "Check if Your Data Was Compromised"
- assertVisible: "Breach Check"
- assertVisible: "Enter Email"
- inputText: "test@example.com"
- tapOn: "Check Breaches"
- assertVisible: "Breach Results"
- assertVisible: "Mark as Complete"
- tapOn: "Mark as Complete"
- assertVisible: "Check Complete"
