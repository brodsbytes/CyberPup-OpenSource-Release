appId: host.exp.exponent
---
# Privacy Protection Flow Test
# Tests all privacy-related checks (1-5-1 through 1-5-2)
- launchApp
- tapOn: "Get Started"
- tapOn: "Start Level 1"
- tapOn: "Protect Your Privacy"
- assertVisible: "Be Smart About What You Share"
- assertVisible: "Control Who Sees Your Information"

# Test 1-5-1: Be Smart About What You Share
- tapOn: "Be Smart About What You Share"
- assertVisible: "Sharing Awareness"
- assertVisible: "Sharing Guidelines"
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "Privacy Tips"
- assertVisible: "Mark as Complete"
- tapOn: "Mark as Complete"
- assertVisible: "Check Complete"

# Test 1-5-2: Control Who Sees Your Information
- tapOn: "Control Who Sees Your Information"
- assertVisible: "Privacy Settings"
- assertVisible: "Social Media Privacy"
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "Settings Guide"
- assertVisible: "Mark as Complete"
- tapOn: "Mark as Complete"
- assertVisible: "Check Complete"
